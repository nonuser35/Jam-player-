<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jam Sync Player | Ultra Sync</title>

<link rel="preconnect" href="https://www.youtube.com">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800&display=swap" rel="stylesheet">

<style>

/* ===== TODO O CSS ORIGINAL MANTIDO ===== */

body,html{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
color:white;
font-family:'Montserrat',sans-serif
}

.bg-container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
overflow:hidden
}

.bg-image{
position:absolute;
top:-10%;
left:-10%;
width:120%;
height:120%;
background-size:cover;
background-position:center;
transition:background-image 1.2s ease-in-out;
filter:blur(3px) brightness(0.4);
animation:backgroundMove 60s infinite alternate
}

@keyframes backgroundMove{
0%{transform:scale(1)}
100%{transform:scale(1.15)}
}

.glass-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
z-index:2
}

.container{
position:relative;
display:flex;
flex-direction:column;
height:100vh;
padding:40px;
justify-content:space-between;
z-index:3;
box-sizing:border-box;
max-width:1200px;
margin:0 auto
}

/* FILA */

.queue-sidebar{
position:fixed;
left:40px;
top:50%;
transform:translateY(-50%);
width:260px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:25px;
padding:25px;
border:1px solid rgba(255,255,255,0.1);
z-index:10;
max-height:70vh;
overflow-y:auto
}

.queue-title{
font-size:0.95rem;
font-weight:800;
color:#1DB954;
letter-spacing:3px;
margin-bottom:25px;
text-align:center
}

.queue-item{
display:flex;
align-items:center;
margin-bottom:20px;
gap:14px
}

.queue-item img{
width:52px;
height:52px;
border-radius:8px;
flex-shrink:0;
object-fit:cover
}

.queue-info{
overflow:hidden
}

.queue-info p{
margin:0;
font-size:1rem;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
width:160px;
font-weight:600
}

.queue-info .q-artist{
color:rgba(255,255,255,0.5);
font-size:0.85rem;
font-weight:400;
margin-top:3px
}

/* CONTROLES */

.song-title{
font-size:2.2rem;
font-weight:800;
margin:0;
text-align:center;
letter-spacing:-1.5px
}

.artist{
font-size:1.2rem;
color:rgba(255,255,255,0.5);
margin-top:5px;
text-align:center
}

.bar-bg{
width:100%;
height:5px;
background:rgba(255,255,255,0.1);
border-radius:10px;
cursor:pointer
}

.bar-fill{
width:0%;
height:100%;
background:#fff;
border-radius:10px;
transition:width 0.3s linear
}

.time-info{
display:flex;
justify-content:space-between;
font-size:0.8rem;
color:rgba(255,255,255,0.4);
margin-top:8px;
font-weight:700
}

.btns{
display:flex;
justify-content:center;
gap:30px;
align-items:center;
margin-top:25px
}

.btns button{
font-size:1.5rem;
opacity:0.6;
transition:0.3s;
color:white;
background:none;
border:none;
cursor:pointer
}

.play{
font-size:4rem !important;
opacity:1 !important
}

</style>
</head>

<body>

<div id="player1"></div>
<div id="player2"></div>

<div class="bg-container">
<div class="bg-image" id="bgImg"></div>
</div>

<div class="glass-overlay"></div>

<div class="queue-sidebar">
<p class="queue-title">PRÓXIMAS</p>
<div id="queueItems"></div>
</div>

<div class="container">

<div class="controls-section">

<p class="song-title" id="trackTitle">Sincronizando...</p>
<p class="artist" id="trackArtist">Aguarde o Host</p>

<div class="bar-bg">
<div class="bar-fill" id="progress"></div>
</div>

<div class="time-info">
<span id="currTime">0:00</span>
<span id="totalTime">0:00</span>
</div>

<div class="btns">
<button onclick="sendCommand('prev')"><i class="fas fa-step-backward"></i></button>
<button class="play" id="playIcon" onclick="sendCommand('playpause')"><i class="fas fa-pause-circle"></i></button>
<button onclick="sendCommand('next')"><i class="fas fa-step-forward"></i></button>
</div>

</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* =========================
VARIÁVEIS
========================= */

let p1,p2,activePlayer,lastVid=""
let pausaManualTimer=0
let socket=null

/* =========================
YOUTUBE
========================= */

function onYouTubeIframeAPIReady(){

const cfg={
height:'1',
width:'1',
playerVars:{
controls:0,
disablekb:1,
enablejsapi:1,
autoplay:1
}
}

p1=new YT.Player('player1',{...cfg})
p2=new YT.Player('player2',{...cfg})

initSync()

}

/* =========================
WEBSOCKET (OPÇÃO 1)
========================= */

function initSync(){

try{

socket=new WebSocket(`ws://${location.host}/ws`)

socket.onmessage=(event)=>{

const data=JSON.parse(event.data)

applyServerState(data)

}

}catch(e){

console.log("WebSocket indisponível, usando polling")

}

setInterval(syncComServidor,1000)

}

/* =========================
POLLING BACKUP
========================= */

async function syncComServidor(){

try{

const res=await fetch(`/status`)
const data=await res.json()

applyServerState(data)

}catch(e){}

}

/* =========================
APLICAR ESTADO DO SERVIDOR
========================= */

function applyServerState(d){

if(!activePlayer) return

const prog=parseFloat(d.progress)||0
const dura=d.duration||1

document.getElementById('progress').style.width=((prog/dura)*100)+"%"

if(d.video_id && d.video_id!==lastVid){

let next=(activePlayer===p1)?p2:p1

next.loadVideoById(d.video_id,prog)

if(activePlayer) activePlayer.pauseVideo()

activePlayer=next

lastVid=d.video_id

}

/* =========================
MICRO CORREÇÃO (OPÇÃO 2)
========================= */

const pTime=activePlayer.getCurrentTime()

let diff=pTime-prog

if(Math.abs(diff)>2){

activePlayer.seekTo(prog,true)

}else{

if(diff>0.15){

activePlayer.setPlaybackRate(0.98)

}
else if(diff<-0.15){

activePlayer.setPlaybackRate(1.02)

}
else{

activePlayer.setPlaybackRate(1)

}

}

}

/* =========================
COMANDOS
========================= */

async function sendCommand(cmd){

if(cmd==="playpause" && activePlayer){

const state=activePlayer.getPlayerState()

if(state===1){

activePlayer.pauseVideo()
document.getElementById('playIcon').innerHTML='<i class="fas fa-play-circle"></i>'

pausaManualTimer=Date.now()+3000

}else{

activePlayer.playVideo()
document.getElementById('playIcon').innerHTML='<i class="fas fa-pause-circle"></i>'

pausaManualTimer=0

}

}

fetch(`/command`,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({cmd:cmd})
})

}

</script>

</body>
</html>
